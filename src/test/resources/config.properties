# SauceDemo Configuration
base.url=https://www.saucedemo.com
browser=chrome
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Valid Credentials
valid.username=standard_user
valid.password=secret_sauce

# Locked Out User (for negative test)
locked.username=locked_out_user
locked.password=secret_sauce

# Problem User
problem.username=problem_user
problem.password=secret_sauce

# Reports
report.path=test-output/ExtentReport.html
screenshot.path=test-output/screenshots/
